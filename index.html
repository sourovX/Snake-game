<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>lush snake · mobile touch + SOUROV</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Poppins', system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      user-select: none;
      -webkit-tap-highlight-color: transparent;
    }

    body {
      min-height: 100vh;
      background: linear-gradient(145deg, #0b1a2e 0%, #1b3b4f 70%, #1e5555 100%);
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 8px;
      position: relative;
      overflow-x: hidden;
    }

    /* floating shapes */
    body::before {
      content: '';
      position: absolute;
      width: 500px;
      height: 500px;
      background: radial-gradient(circle, #ffb56b 0%, transparent 70%);
      top: -150px;
      right: -100px;
      opacity: 0.15;
      border-radius: 50%;
      filter: blur(70px);
      z-index: 0;
      animation: floatBlob 22s infinite alternate ease-in-out;
    }

    body::after {
      content: '';
      position: absolute;
      width: 600px;
      height: 600px;
      background: radial-gradient(circle, #8bcdcd 0%, transparent 70%);
      bottom: -200px;
      left: -150px;
      opacity: 0.15;
      border-radius: 50%;
      filter: blur(90px);
      z-index: 0;
      animation: floatBlob 26s infinite alternate-reverse;
    }

    @keyframes floatBlob {
      0% { transform: translate(0, 0) scale(1); }
      100% { transform: translate(40px, -40px) scale(1.2); }
    }

    .game-wrapper {
      width: 100%;
      max-width: 620px;
      background: rgba(18, 30, 41, 0.65);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-radius: 48px;
      padding: 20px 16px 24px;
      border: 2px solid rgba(255, 215, 140, 0.5);
      box-shadow: 0 30px 50px rgba(0, 0, 0, 0.5), 0 0 0 1px rgba(255, 230, 170, 0.3) inset;
      z-index: 10;
    }

    /* start screen */
    .start-screen {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 28px;
    }

    .brand h1 {
      font-size: 3.8rem;
      font-weight: 800;
      background: linear-gradient(135deg, #f9d976, #f39f86, #9ad0c2);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      letter-spacing: 2px;
      text-shadow: 0 10px 20px rgba(0,0,0,0.4);
      line-height: 1.1;
    }

    .brand p {
      font-size: 1.3rem;
      color: #cfe5cf;
      text-align: center;
    }

    .btn-start {
      background: linear-gradient(to right, #6dd5ed, #2193b0);
      border: none;
      padding: 16px 56px;
      border-radius: 80px;
      font-size: 2rem;
      font-weight: 700;
      color: #032b2f;
      box-shadow: 0 12px 0 #034b5e, 0 20px 30px #00000050, 0 0 0 3px #b3f0ff inset;
      cursor: pointer;
      transition: 0.1s linear;
    }

    .btn-start:active {
      transform: translateY(8px);
      box-shadow: 0 4px 0 #034b5e, 0 15px 25px #00000050, 0 0 0 3px #b3f0ff inset;
    }

    /* main game */
    .game-main {
      display: none;
    }

    .signature-header {
      text-align: center;
      margin-bottom: 12px;
      padding: 8px 12px;
      background: rgba(255, 215, 140, 0.2);
      border-radius: 60px;
      border: 1px solid #f9b872;
      box-shadow: 0 0 15px #fbc28e;
    }

    .signature-header p {
      font-size: 1.4rem;
      font-weight: 600;
      color: #fbe6b0;
      text-shadow: 0 2px 3px #1f443b;
    }

    .signature-header span {
      background: linear-gradient(145deg, #fbd06b, #ffa55c);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      font-weight: 800;
    }

    .stats-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0 4px 12px 4px;
      gap: 8px;
    }

    .score-card, .high-score-card {
      background: #1b3a44;
      border-radius: 50px;
      padding: 8px 16px;
      box-shadow: 0 5px 0 #0d262e;
      display: flex;
      align-items: center;
      gap: 6px;
      border: 2px solid #f3b87a;
      flex: 1;
    }

    .score-icon {
      font-size: 1.6rem;
    }

    .score-value {
      font-size: 1.8rem;
      font-weight: 800;
      background: #1d121f;
      padding: 2px 16px;
      border-radius: 40px;
      color: #fbe49b;
      border: 2px solid #ffb56b;
      margin-left: auto;
    }

    .high-score-card span {
      font-size: 1.5rem;
      font-weight: 600;
      color: #fbe593;
    }

    /* canvas */
    .canvas-container {
      display: flex;
      justify-content: center;
      border-radius: 40px;
      overflow: hidden;
      border: 4px solid #f6c89f;
      box-shadow: 0 15px 25px rgba(0, 0, 0, 0.6);
      background: #142830;
      margin-bottom: 16px;
      position: relative;
    }

    canvas {
      display: block;
      width: 100%;
      height: auto;
      background: radial-gradient(circle at 20% 30%, #2f655f, #1b433e);
      aspect-ratio: 1 / 1;
      touch-action: none;
    }

    /* GAME OVER OVERLAY */
    .gameover-overlay {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 15, 20, 0.8);
      backdrop-filter: blur(6px);
      display: none;
      justify-content: center;
      align-items: center;
      z-index: 20;
      border-radius: 40px;
    }

    .gameover-overlay.active {
      display: flex;
    }

    .gameover-box {
      background: #213b4a;
      padding: 20px 24px;
      border-radius: 50px;
      border: 4px solid #f8c39b;
      text-align: center;
    }

    .gameover-box h2 {
      font-size: 2.4rem;
      color: #ffddbb;
    }

    .gameover-box p {
      font-size: 1.8rem;
      margin: 16px 0 8px;
      color: #fee6b0;
    }

    .gameover-box button {
      background: #ffb66b;
      border: none;
      padding: 10px 24px;
      border-radius: 50px;
      font-size: 1.4rem;
      font-weight: 700;
      box-shadow: 0 5px 0 #a55317;
      cursor: pointer;
      margin-top: 16px;
    }

    .gameover-box button:active {
      transform: translateY(4px);
      box-shadow: 0 1px 0 #a55317;
    }

    /* ---------- TOUCH CONTROL PANEL (big buttons) ---------- */
    .touch-panel {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
      margin-top: 8px;
    }

    .dpad-row {
      display: flex;
      justify-content: center;
      gap: 25px;
      margin: 5px 0;
    }

    .dpad-btn {
      width: 80px;
      height: 80px;
      border-radius: 50px;
      background: linear-gradient(145deg, #2f5570, #183b4a);
      border: 3px solid #ffcd94;
      box-shadow: 0 8px 0 #0a2632, 0 12px 20px black;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 3.4rem;
      font-weight: bold;
      color: #ffeca2;
      cursor: pointer;
      transition: 0.05s linear;
      touch-action: manipulation;
      -webkit-tap-highlight-color: transparent;
    }

    .dpad-btn:active {
      transform: translateY(6px);
      box-shadow: 0 2px 0 #0a2632, 0 8px 15px black;
    }

    .restart-touch-btn {
      background: #f4ac7b;
      border: none;
      padding: 14px 30px;
      border-radius: 60px;
      font-weight: 700;
      font-size: 1.6rem;
      color: #1c2f3a;
      box-shadow: 0 7px 0 #ad6742, 0 10px 20px black;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      border: 2px solid #ffeab5;
      margin-top: 5px;
      touch-action: manipulation;
    }

    .restart-touch-btn:active {
      transform: translateY(5px);
      box-shadow: 0 2px 0 #ad6742, 0 8px 15px black;
    }

    /* hide desktop hint on very small, but keep visible */
    .key-hint {
      background: #1b3b48;
      padding: 8px 18px;
      border-radius: 50px;
      font-size: 1.2rem;
      color: #ffdba5;
      border: 1px solid #ffb56b;
      text-align: center;
      margin: 8px 0 4px;
    }

    @media (max-width: 480px) {
      .dpad-btn { width: 70px; height: 70px; font-size: 2.8rem; }
      .signature-header p { font-size: 1.1rem; }
    }
  </style>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap" rel="stylesheet">
</head>
<body>
<div class="game-wrapper">
  <!-- start screen -->
  <div id="startScreen" class="start-screen">
    <div class="brand">
      <h1>🍃 LUSH SNAKE</h1>
      <p>modern · smooth · mobile + SOUROV</p>
    </div>
    <button class="btn-start" id="startBtn">🐍 START</button>
  </div>

  <!-- main game screen (hidden initially) -->
  <div id="gameMain" class="game-main">
    <!-- signature -->
    <div class="signature-header">
      <p>😄 HA HA, How is it? <span>Created by me (SOUROV)</span> 😎</p>
    </div>

    <!-- scores -->
    <div class="stats-bar">
      <div class="score-card">
        <span class="score-icon">🍎</span>
        <span class="score-value" id="scoreDisplay">0</span>
      </div>
      <div class="high-score-card">
        <span>🏆</span>
        <span id="highScoreDisplay">0</span>
      </div>
    </div>

    <!-- canvas arena with overlay -->
    <div class="canvas-container">
      <canvas id="snakeCanvas" width="560" height="560"></canvas>
      <!-- game over overlay -->
      <div id="gameoverOverlay" class="gameover-overlay">
        <div class="gameover-box">
          <h2>💫 GAME OVER</h2>
          <p id="finalScoreMsg">score: 0</p>
          <button id="restartGameBtn">↻ PLAY AGAIN</button>
        </div>
      </div>
    </div>

    <!-- ========== TOUCH CONTROL BUTTONS (mobile friendly) ========== -->
    <div class="touch-panel">
      <!-- directional pad -->
      <div class="dpad-row">
        <div class="dpad-btn" id="touchUp">⬆️</div>
      </div>
      <div class="dpad-row">
        <div class="dpad-btn" id="touchLeft">⬅️</div>
        <div class="dpad-btn" id="touchDown">⬇️</div>
        <div class="dpad-btn" id="touchRight">➡️</div>
      </div>

      <!-- restart + hint -->
      <div style="display: flex; justify-content: center; gap: 15px; flex-wrap: wrap;">
        <button class="restart-touch-btn" id="resetTouchBtn"><span>⟳</span> RESTART</button>
      </div>
      <div class="key-hint">← ↑ → ↓  (or use keyboard)</div>
    </div>
  </div>
</div>

<script>
  (function(){
    // -------------------- AUDIO --------------------
    let audioCtx = null;
    function initAudio() {
      if (audioCtx) return;
      audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    }
    function playEatSound() {
      if (!audioCtx) return;
      const osc = audioCtx.createOscillator();
      const gain = audioCtx.createGain();
      osc.type = 'sine';
      osc.frequency.value = 540;
      gain.gain.value = 0.12;
      osc.connect(gain);
      gain.connect(audioCtx.destination);
      osc.start();
      osc.stop(audioCtx.currentTime + 0.12);
    }
    function playGameoverSound() {
      if (!audioCtx) return;
      const osc1 = audioCtx.createOscillator();
      const gain1 = audioCtx.createGain();
      osc1.type = 'triangle';
      osc1.frequency.setValueAtTime(320, audioCtx.currentTime);
      osc1.frequency.exponentialRampToValueAtTime(160, audioCtx.currentTime + 0.2);
      gain1.gain.value = 0.15;
      osc1.connect(gain1);
      gain1.connect(audioCtx.destination);
      osc1.start();
      osc1.stop(audioCtx.currentTime + 0.25);
    }

    // -------------------- DOM --------------------
    const startScreen = document.getElementById('startScreen');
    const gameMain = document.getElementById('gameMain');
    const startBtn = document.getElementById('startBtn');
    const canvas = document.getElementById('snakeCanvas');
    const ctx = canvas.getContext('2d');
    const scoreSpan = document.getElementById('scoreDisplay');
    const highScoreSpan = document.getElementById('highScoreDisplay');
    const gameoverOverlay = document.getElementById('gameoverOverlay');
    const finalScoreMsg = document.getElementById('finalScoreMsg');
    const restartGameBtn = document.getElementById('restartGameBtn');
    const resetTouchBtn = document.getElementById('resetTouchBtn'); // bottom restart

    // touch buttons
    const touchUp = document.getElementById('touchUp');
    const touchDown = document.getElementById('touchDown');
    const touchLeft = document.getElementById('touchLeft');
    const touchRight = document.getElementById('touchRight');

    // -------------------- GAME STATE --------------------
    const GRID_SIZE = 20;
    const CELL_SIZE = canvas.width / GRID_SIZE;

    let snake = [];
    let food = { x: 8, y: 10 };
    let direction = 'RIGHT';
    let nextDirection = 'RIGHT';
    let score = 0;
    let highScore = localStorage.getItem('snakeHighScore') ? parseInt(localStorage.getItem('snakeHighScore')) : 0;
    let gameRunning = false;
    let gameLoopInterval = null;
    let speedMs = 130;           // base speed
    const SPEED_BASE = 130;
    const MIN_SPEED = 60;

    highScoreSpan.innerText = highScore;

    // ---------- helper: generate food ----------
    function generateFood() {
      const maxAttempts = 2000;
      for (let i = 0; i < maxAttempts; i++) {
        const fx = Math.floor(Math.random() * GRID_SIZE);
        const fy = Math.floor(Math.random() * GRID_SIZE);
        if (!snake.some(seg => seg.x === fx && seg.y === fy)) {
          food = { x: fx, y: fy };
          return;
        }
      }
      for (let y = 0; y < GRID_SIZE; y++) {
        for (let x = 0; x < GRID_SIZE; x++) {
          if (!snake.some(seg => seg.x === x && seg.y === y)) {
            food = { x, y };
            return;
          }
        }
      }
      gameRunning = false;
      gameOver('win');
    }

    // ---------- init ----------
    function initGame() {
      snake = [
        { x: 10, y: 10 },
        { x: 9, y: 10 },
        { x: 8, y: 10 },
        { x: 7, y: 10 }
      ];
      direction = 'RIGHT';
      nextDirection = 'RIGHT';
      score = 0;
      scoreSpan.innerText = '0';
      generateFood();
      gameRunning = true;
      gameoverOverlay.classList.remove('active');
      speedMs = SPEED_BASE;
    }

    // ---------- game over ----------
    function gameOver(reason = 'collision') {
      if (!gameRunning) return;
      gameRunning = false;
      if (gameLoopInterval) {
        clearInterval(gameLoopInterval);
        gameLoopInterval = null;
      }
      playGameoverSound();
      finalScoreMsg.innerText = `🍎 score: ${score}`;
      gameoverOverlay.classList.add('active');

      if (score > highScore) {
        highScore = score;
        localStorage.setItem('snakeHighScore', highScore);
        highScoreSpan.innerText = highScore;
      }
    }

    // ---------- move snake ----------
    function move() {
      if (!gameRunning) return;

      direction = nextDirection;

      let newHead = { ...snake[0] };
      switch (direction) {
        case 'RIGHT': newHead.x += 1; break;
        case 'LEFT': newHead.x -= 1; break;
        case 'UP': newHead.y -= 1; break;
        case 'DOWN': newHead.y += 1; break;
      }

      // wall
      if (newHead.x < 0 || newHead.x >= GRID_SIZE || newHead.y < 0 || newHead.y >= GRID_SIZE) {
        gameOver('wall');
        return;
      }

      const foodEaten = (newHead.x === food.x && newHead.y === food.y);

      // self collision
      let willSelfCollide = false;
      if (!foodEaten) {
        willSelfCollide = snake.slice(0, -1).some(seg => seg.x === newHead.x && seg.y === newHead.y);
      } else {
        willSelfCollide = snake.some(seg => seg.x === newHead.x && seg.y === newHead.y);
      }
      if (willSelfCollide) {
        gameOver('self');
        return;
      }

      snake.unshift(newHead);
      if (!foodEaten) {
        snake.pop();
      } else {
        score++;
        scoreSpan.innerText = score;
        playEatSound();

        let newSpeed = Math.max(MIN_SPEED, SPEED_BASE - Math.floor(score / 2) * 8);
        if (newSpeed !== speedMs) {
          speedMs = newSpeed;
          resetInterval();
        }
        generateFood();
      }
    }

    // ---------- draw ----------
    function draw() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);

      // grid
      ctx.strokeStyle = '#598d8b';
      ctx.lineWidth = 1;
      ctx.globalAlpha = 0.3;
      for (let i = 0; i <= GRID_SIZE; i++) {
        ctx.beginPath();
        ctx.moveTo(i * CELL_SIZE, 0);
        ctx.lineTo(i * CELL_SIZE, canvas.height);
        ctx.strokeStyle = '#adcfcf';
        ctx.stroke();
        ctx.beginPath();
        ctx.moveTo(0, i * CELL_SIZE);
        ctx.lineTo(canvas.width, i * CELL_SIZE);
        ctx.stroke();
      }
      ctx.globalAlpha = 1.0;

      // snake
      snake.forEach((segment, idx) => {
        const x = segment.x * CELL_SIZE;
        const y = segment.y * CELL_SIZE;
        const gradient = ctx.createRadialGradient(x + 10, y + 10, 2, x + 14, y + 14, 16);
        if (idx === 0) {
          gradient.addColorStop(0, '#b8ffb0');
          gradient.addColorStop(1, '#5fbf6f');
        } else {
          gradient.addColorStop(0, '#83d18b');
          gradient.addColorStop(1, '#328f5c');
        }
        ctx.shadowColor = idx === 0 ? '#c8ff90' : '#387a46';
        ctx.shadowBlur = 15;
        ctx.beginPath();
        ctx.roundRect(x + 2, y + 2, CELL_SIZE - 4, CELL_SIZE - 4, 8);
        ctx.fillStyle = gradient;
        ctx.fill();
      });

      // food
      ctx.shadowBlur = 25;
      ctx.shadowColor = '#fba76f';
      const fx = food.x * CELL_SIZE + CELL_SIZE / 2;
      const fy = food.y * CELL_SIZE + CELL_SIZE / 2;
      ctx.beginPath();
      ctx.arc(fx, fy, CELL_SIZE * 0.3, 0, 2 * Math.PI);
      ctx.fillStyle = '#ff4f6b';
      ctx.fill();
      ctx.shadowBlur = 15;
      ctx.fillStyle = '#ff849c';
      ctx.beginPath();
      ctx.arc(fx - 3, fy - 3, 4, 0, 2 * Math.PI);
      ctx.fill();
      ctx.fillStyle = '#a6f0a6';
      ctx.shadowBlur = 12;
      ctx.beginPath();
      ctx.ellipse(fx - 8, fy - 12, 4, 6, 0.2, 0, 2 * Math.PI);
      ctx.fill();
      ctx.shadowBlur = 0;
    }

    // helper roundRect
    CanvasRenderingContext2D.prototype.roundRect = function (x, y, w, h, r) {
      if (w < 2 * r) r = w / 2;
      if (h < 2 * r) r = h / 2;
      this.moveTo(x + r, y);
      this.lineTo(x + w - r, y);
      this.quadraticCurveTo(x + w, y, x + w, y + r);
      this.lineTo(x + w, y + h - r);
      this.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
      this.lineTo(x + r, y + h);
      this.quadraticCurveTo(x, y + h, x, y + h - r);
      this.lineTo(x, y + r);
      this.quadraticCurveTo(x, y, x + r, y);
      this.closePath();
      return this;
    };

    function resetInterval() {
      if (gameLoopInterval) {
        clearInterval(gameLoopInterval);
        if (gameRunning) {
          gameLoopInterval = setInterval(() => { move(); draw(); }, speedMs);
        }
      }
    }

    function startGameLoop() {
      if (gameLoopInterval) clearInterval(gameLoopInterval);
      gameLoopInterval = setInterval(() => { move(); draw(); }, speedMs);
    }

    // ---------- EVENT LISTENERS (keyboard + TOUCH) ----------
    function changeDirection(newDir) {
      if (!gameRunning) return;
      if ((newDir === 'UP' && direction !== 'DOWN') ||
          (newDir === 'DOWN' && direction !== 'UP') ||
          (newDir === 'LEFT' && direction !== 'RIGHT') ||
          (newDir === 'RIGHT' && direction !== 'LEFT')) {
        nextDirection = newDir;
      }
    }

    // keyboard
    window.addEventListener('keydown', (e) => {
      const key = e.key;
      e.preventDefault();
      if (!gameRunning) return;
      if (key === 'ArrowUp' && direction !== 'DOWN') nextDirection = 'UP';
      else if (key === 'ArrowDown' && direction !== 'UP') nextDirection = 'DOWN';
      else if (key === 'ArrowLeft' && direction !== 'RIGHT') nextDirection = 'LEFT';
      else if (key === 'ArrowRight' && direction !== 'LEFT') nextDirection = 'RIGHT';
    });

    // TOUCH BUTTONS (big and easy)
    touchUp.addEventListener('click', (e) => {
      e.preventDefault();
      changeDirection('UP');
    });
    touchDown.addEventListener('click', (e) => {
      e.preventDefault();
      changeDirection('DOWN');
    });
    touchLeft.addEventListener('click', (e) => {
      e.preventDefault();
      changeDirection('LEFT');
    });
    touchRight.addEventListener('click', (e) => {
      e.preventDefault();
      changeDirection('RIGHT');
    });

    // restart from overlay & bottom button
    function restartFull() {
      if (!gameRunning && gameoverOverlay.classList.contains('active')) {
        gameoverOverlay.classList.remove('active');
      }
      initGame();
      if (gameLoopInterval) clearInterval(gameLoopInterval);
      startGameLoop();
      draw();
    }

    restartGameBtn.addEventListener('click', (e) => {
      e.preventDefault();
      restartFull();
    });

    resetTouchBtn.addEventListener('click', (e) => {
      e.preventDefault();
      restartFull();
    });

    // start button
    startBtn.addEventListener('click', () => {
      initAudio();
      startScreen.style.display = 'none';
      gameMain.style.display = 'block';
      initGame();
      startGameLoop();
      draw();
    });

    // prevent canvas touch events from scrolling
    canvas.addEventListener('touchstart', (e) => e.preventDefault());

    // initial
    gameMain.style.display = 'none';
    highScoreSpan.innerText = highScore;
  })();
</script>
</body>
</html>
